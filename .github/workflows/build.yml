name: Build

on:
  push:
    branches: ["*"]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      onefile:
        description: "Create single-file executable"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pip install -e .
      - run: pytest --tb=short -q

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install mypy
      - run: pip install -r requirements.txt
      - run: mypy src/ --ignore-missing-imports

  build:
    name: Build (${{ matrix.os }})
    needs: [test, lint, typecheck]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: iconic-file-filer-linux
          - os: windows-latest
            artifact: iconic-file-filer-windows
          - os: macos-latest
            artifact: iconic-file-filer-macos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pip install -e .

      - name: Build executable (Windows / macOS)
        if: runner.os != 'Linux'
        run: python build.py --onefile

      - name: Rename Windows binary
        if: runner.os == 'Windows'
        shell: bash
        run: mv dist/iconic-filer.exe "dist/IconicFileFiler-windows-x86_64.exe"

      - name: Rename macOS binary
        if: runner.os == 'macOS'
        run: mv dist/iconic-filer "dist/IconicFileFiler-macos-arm64"

      # ── Linux: build onedir + AppImage ────────────────────────────────
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libfuse2 python3-tk fuse

      - name: Download appimagetool
        if: runner.os == 'Linux'
        run: |
          wget -q \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O appimagetool
          chmod +x appimagetool

      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        run: python build.py --appimage
        env:
          ARCH: x86_64

      - name: Rename AppImage for release
        if: runner.os == 'Linux'
        run: |
          VERSION=$(python -c 'from iconic_filer import __version__; print(__version__)')
          mv dist/IconicFiler-x86_64.AppImage \
             "dist/IconicFileFiler-${VERSION}-x86_64.AppImage"

      # Also keep a plain binary for Linux users who don't want AppImage
      - name: Build plain binary (Linux)
        if: runner.os == 'Linux'
        run: python build.py --onefile

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          retention-days: 30
