name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: file-wayfinder-linux
          - os: windows-latest
            artifact: file-wayfinder-windows
          - os: macos-latest
            artifact: file-wayfinder-macos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pip install -e .
      - run: pytest --tb=short -q

      - name: Build executable (Windows / macOS)
        if: runner.os != 'Linux'
        run: python build.py --onefile

      - name: Rename Windows binary
        if: runner.os == 'Windows'
        shell: bash
        run: mv dist/file-wayfinder.exe "dist/FileWayfinder-windows-x86_64.exe"

      - name: Rename macOS binary
        if: runner.os == 'macOS'
        run: mv dist/file-wayfinder "dist/FileWayfinder-macos-arm64"

      # ── Linux: onedir + AppImage + plain binary ────────────────────
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libfuse2 python3-tk fuse

      - name: Download appimagetool
        if: runner.os == 'Linux'
        run: |
          wget -q \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O appimagetool
          chmod +x appimagetool

      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        run: python build.py --appimage
        env:
          ARCH: x86_64

      - name: Rename AppImage with version
        if: runner.os == 'Linux'
        run: |
          VERSION=$(python -c 'from file_wayfinder import __version__; print(__version__)')
          mv dist/FileWayfinder-x86_64.AppImage "dist/FileWayfinder-${VERSION}-x86_64.AppImage"

      - name: Build plain binary (Linux)
        if: runner.os == 'Linux'
        run: python build.py --onefile

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
